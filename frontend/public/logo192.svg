<!-- logo192.svg - Convert this to 192x192 PNG -->
<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#0066cc"/>
  
  <!-- Log lines representation -->
  <rect x="24" y="24" width="144" height="8" rx="4" fill="white" opacity="0.9"/>
  <rect x="24" y="40" width="120" height="6" rx="3" fill="white" opacity="0.8"/>
  <rect x="24" y="54" width="96" height="6" rx="3" fill="white" opacity="0.7"/>
  <rect x="24" y="68" width="108" height="6" rx="3" fill="#ff6b6b" opacity="0.9"/>
  <rect x="24" y="82" width="84" height="6" rx="3" fill="white" opacity="0.6"/>
  <rect x="24" y="96" width="72" height="6" rx="3" fill="#ffd93d" opacity="0.9"/>
  <rect x="24" y="110" width="90" height="6" rx="3" fill="white" opacity="0.5"/>
  <rect x="24" y="124" width="66" height="6" rx="3" fill="white" opacity="0.4"/>
  <rect x="24" y="138" width="78" height="6" rx="3" fill="#4ecdc4" opacity="0.8"/>
  <rect x="24" y="152" width="54" height="6" rx="3" fill="white" opacity="0.3"/>
  
  <!-- Terminal cursor -->
  <rect x="82" y="150" width="2" height="8" fill="white">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
